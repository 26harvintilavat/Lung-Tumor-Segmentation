<!doctype html>
<html>
  <head>
    <title>Lung Tumor Segmentation</title>
    <style>
      body {
        background: #1a1a1a;
        color: white;
        font-family: Arial;
        padding: 20px;
      }
      h1 {
        color: #00ff88;
      }
      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .slice {
        text-align: center;
      }
      img {
        border: 2px solid #00ff88;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Lung Tumor Segmentation Results</h1>
    <p>Model: Attention U-Net | Val Dice: 0.7545</p>
    <div id="results"></div>

    <script>
      async function predict() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".zip";

        input.onchange = async (e) => {
          const file = e.target.files[0];
          const formData = new FormData();
          formData.append("file", file);

          document.getElementById("results").innerHTML =
            "<p>Processing... please wait</p>";

          const response = await fetch("http://localhost:8000/predict", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();

          let html = `
                <h2>Results</h2>
                <p>Total slices: ${data.total_slices}</p>
                <p>Tumor slices found: 
                   <strong style="color:#ff4444">
                   ${data.tumor_slices}
                   </strong>
                </p>
                <div class="grid">
            `;
          data.overlays.forEach((o) => {
            html += `
                    <div class="slice">
                        <p>Slice ${o.slice_index} 
                           (${o.tumor_pixels} pixels)</p>
                        <img src="data:image/png;base64,
                             ${o.image_base64}" 
                             width="256" height="256"/>
                    </div>
                `;
          });
          html += "</div>";
          document.getElementById("results").innerHTML = html;
        };
        input.click();
      }

      // Auto trigger on load
      window.onload = () => {
        const btn = document.createElement("button");
        btn.innerText = "Upload DICOM ZIP";
        btn.style = `
            background: #00ff88; color: black;
            border: none; padding: 15px 30px;
            font-size: 18px; border-radius: 8px;
            cursor: pointer; margin: 20px 0;
        `;
        btn.onclick = predict;
        document.body.insertBefore(btn, document.getElementById("results"));
      };
    </script>
  </body>
</html>
